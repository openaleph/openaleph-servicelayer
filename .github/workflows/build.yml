name: build openaleph-servicelayer

on: [push]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Show ref
        run: echo "$GITHUB_REF"
      - name: Build/pull Docker images
        run: |
          docker compose build shell
      - name: Run the code format check
        run: docker compose run --rm shell make format-check
      - name: Run the linter
        run: docker compose run --rm shell make lint
      - name: Run the tests
        # Some tests rely on the package being installed
        run: docker compose run --rm shell bash -c "make install && make test-local"
      - name: Build a distribution
        run: docker compose run --rm shell python3 setup.py sdist bdist_wheel
      - name: Publish a Python distribution to PyPI
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.pypi_password }}

  api-docker:
    runs-on: ubuntu-latest
    needs: python
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/openaleph/servicelayer-api
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
